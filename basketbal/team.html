<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Shots - Team Beheer</title>
    <link rel="stylesheet" href="basketbal.css">
</head>
<body style="overflow-y: auto;">

    <div id="cloud-status-indicator" style="position: fixed; bottom: 20px; right: 20px; background: #27ae60; color: white; padding: 10px 20px; border-radius: 30px; font-weight: bold; font-size: 0.9rem; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 99999; transition: 0.3s;">
        ☁️ Cloud Actief
    </div>

    <nav class="top-nav">
        <h1>🏀 Black Shots Clubbeheer</h1>
        <a href="../index.html" class="terug-knop">🏠 Terug naar Portaal</a>
    </nav>


    <main class="content-sectie active" style="max-width: 1300px; margin: 0 auto;">
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; margin-bottom:15px; border-bottom:2px solid var(--border-color); padding-bottom:10px;">
            <div>
                <h2 style="margin:0;">👥 Verenigingsteams</h2>
                <p style="color: #7f8c8d; margin-top:5px;">Beheer hier de officiële teams, gekoppelde coaches, autoplanning en wedstrijden.</p>
            </div>
        </div>

        <div style="background: white; padding: 20px; border-radius: 8px; border: 1px solid var(--border-color); box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 25px;">
            <h3 style="margin-top:0; color:var(--secondary-color);">+ Nieuw Team Aanmaken</h3>
            <div style="display:flex; gap:15px; flex-wrap:wrap; align-items:flex-end;">
                <div style="flex:2; min-width:150px;">
                    <label style="font-weight:bold; font-size:0.85rem; color:#7f8c8d;">Groepsnaam/Teamnaam:</label>
                    <input type="text" id="nieuw-team-naam" placeholder="Bijv. X10-1 of Vrijwilligers" style="width:100%; padding:10px; border:1px solid #bdc3c7; border-radius:4px;">
                </div>
                <div style="flex:2; min-width:150px;">
                    <label style="font-weight:bold; font-size:0.85rem; color:#7f8c8d;">👨‍💼 Coach/Leider (Koppel Persoon):</label>
                    <select id="nieuw-team-coach" style="width:100%; padding:10px; border:1px solid #bdc3c7; border-radius:4px; font-weight:bold;"></select>
                </div>
                <div style="flex:2; min-width:150px;">
                    <label style="font-weight:bold; font-size:0.85rem; color:#7f8c8d;">🏃‍♂️ Trainer (Koppel Persoon):</label>
                    <select id="nieuw-team-trainer" style="width:100%; padding:10px; border:1px solid #bdc3c7; border-radius:4px; font-weight:bold;"></select>
                </div>
                
                <div style="flex:1; min-width:120px;">
                    <label style="font-weight:bold; font-size:0.85rem; color:#7f8c8d;">⏱️ Duur (Min):</label>
                    <input type="number" id="nieuw-team-duur" placeholder="Bijv. 90" value="90" style="width:100%; padding:10px; border:1px solid #bdc3c7; border-radius:4px;">
                </div>
                <div style="flex:1; min-width:120px;">
                    <label style="font-weight:bold; font-size:0.85rem; color:#7f8c8d;">🚗 Max Auto's:</label>
                    <input type="number" id="nieuw-team-autos" placeholder="Standaard max 3" value="3" style="width:100%; padding:10px; border:1px solid #bdc3c7; border-radius:4px;">
                </div>

                <div style="display:flex; align-items:center; gap:5px; margin-bottom:10px; flex:1; min-width:150px;">
                    <input type="checkbox" id="nieuw-team-is-vrijwilliger" style="width:18px; height:18px;">
                    <label style="font-weight:bold; font-size:0.85rem; color:#9b59b6;">Is Kader Groep</label>
                </div>
                <button onclick="window.voegTeamToe()" style="background:#27ae60; color:white; border:none; padding:10px 20px; border-radius:4px; font-weight:bold; cursor:pointer; height:41px;">Toevoegen</button>
            </div>
        </div>

        <div style="display:flex; justify-content:flex-end; margin-bottom: 15px; align-items:center;">
            <label style="font-size:0.85rem; color:#7f8c8d; font-weight:bold; margin-right:10px;">📌 Toon team-taken tot en met:</label>
            <input type="date" id="team-event-horizon-date" onchange="window.renderTeamBeheer()" style="padding:6px 10px; border-radius:4px; border:1px solid #bdc3c7; font-weight:bold; color:var(--secondary-color); cursor:pointer; font-family:inherit;">
        </div>
        <ul id="team-beheer-lijst" style="list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:15px;">
        </ul>
    </main>
    
    <div id="team-edit-modal" class="modal-overlay" style="display:none; z-index:999999;">
        <div class="modal-content" style="max-width:550px; width:90%; padding:25px;">
            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid var(--border-color); padding-bottom:10px; margin-bottom:15px;">
                <h2 style="margin:0; color:var(--secondary-color);">✏️ Team Instellingen</h2>
                <button onclick="window.sluitTeamModal()" class="sluit-knop" style="font-size: 1.5rem; padding: 5px 15px;">X</button>
            </div>
            
            <input type="hidden" id="edit-team-index">
            
            <div style="margin-bottom:15px;">
                <label style="font-weight:bold; font-size:0.85rem; color:#7f8c8d;">Groepsnaam/Teamnaam:</label>
                <input type="text" id="edit-team-naam" style="width:100%; padding:10px; border:1px solid #bdc3c7; border-radius:4px; font-weight:bold; font-size:1.1rem;">
            </div>

            <div style="margin-bottom:15px;">
                <label style="font-weight:bold; font-size:0.85rem; color:#7f8c8d;">🔗 Aliassen (bijv. M14, Mix14-1):</label>
                <input type="text" id="edit-team-aliassen" placeholder="Meerdere scheiden met een komma..." style="width:100%; padding:10px; border:1px solid #bdc3c7; border-radius:4px;">
                <p style="font-size:0.75rem; color:#95a5a6; margin:3px 0 0 0;">Helpt het systeem begrijpen dat X14-1 en M14 hetzelfde team is.</p>
            </div>

            <style>
            .kleur-swatch { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.2s; box-sizing: border-box; display: inline-block; }
            .kleur-swatch:hover { transform: scale(1.1); }
            </style>

            <div style="margin-bottom:15px;">
                <label style="font-weight:bold; font-size:0.85rem; color:#7f8c8d;">🎨 Team Kleur:</label>
                <div id="kleur-kiezers" style="display: flex; gap: 10px; margin-top: 8px; flex-wrap: wrap;">
                    <div class="kleur-swatch" data-kleur="#f1c40f" style="background-color: #f1c40f;" onclick="window.kiesTeamKleur('#f1c40f')" title="Geel"></div>
                    <div class="kleur-swatch" data-kleur="#e67e22" style="background-color: #e67e22;" onclick="window.kiesTeamKleur('#e67e22')" title="Oranje"></div>
                    <div class="kleur-swatch" data-kleur="#e74c3c" style="background-color: #e74c3c;" onclick="window.kiesTeamKleur('#e74c3c')" title="Rood"></div>
                    <div class="kleur-swatch" data-kleur="#9b59b6" style="background-color: #9b59b6;" onclick="window.kiesTeamKleur('#9b59b6')" title="Paars"></div>
                    <div class="kleur-swatch" data-kleur="#3498db" style="background-color: #3498db;" onclick="window.kiesTeamKleur('#3498db')" title="Lichtblauw"></div>
                    <div class="kleur-swatch" data-kleur="#2980b9" style="background-color: #2980b9;" onclick="window.kiesTeamKleur('#2980b9')" title="Donkerblauw"></div>
                    <div class="kleur-swatch" data-kleur="#1abc9c" style="background-color: #1abc9c;" onclick="window.kiesTeamKleur('#1abc9c')" title="Turquoise"></div>
                    <div class="kleur-swatch" data-kleur="#2ecc71" style="background-color: #2ecc71;" onclick="window.kiesTeamKleur('#2ecc71')" title="Groen"></div>
                    <div class="kleur-swatch" data-kleur="#34495e" style="background-color: #34495e;" onclick="window.kiesTeamKleur('#34495e')" title="Donkergrijs"></div>
                    <div class="kleur-swatch" id="custom-kleur-knop" style="background-color: #fff; border: 2px dashed #bdc3c7; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #7f8c8d; font-size: 1.2rem;" onclick="document.getElementById('edit-team-custom-kleur').click()" title="Eigen kleur kiezen">+</div>
                </div>
                <input type="hidden" id="edit-team-kleur" value="#3498db">
                <input type="color" id="edit-team-custom-kleur" style="display:none;" onchange="window.kiesEigenKleur(this.value)">
            </div>

            <div style="display:flex; gap:15px; margin-bottom:15px;">
                <div style="flex:1;">
                    <label style="font-weight:bold; font-size:0.85rem; color:#7f8c8d;">👨‍💼 Coach (Koppel Persoon):</label>
                    <select id="edit-team-coach" style="width:100%; padding:10px; border:1px solid #bdc3c7; border-radius:4px; font-weight:bold;"></select>
                </div>
                <div style="flex:1;">
                    <label style="font-weight:bold; font-size:0.85rem; color:#7f8c8d;">🏃‍♂️ Trainer (Koppel Persoon):</label>
                    <select id="edit-team-trainer" style="width:100%; padding:10px; border:1px solid #bdc3c7; border-radius:4px; font-weight:bold;"></select>
                </div>
            </div>

            <div style="display:flex; gap:15px; margin-bottom:15px;">
                <div style="flex:1;">
                    <label style="font-weight:bold; font-size:0.85rem; color:#7f8c8d;">⏱️ Thuiswedstrijd Duur (min):</label>
                    <input type="number" id="edit-team-duur" style="width:100%; padding:10px; border:1px solid #bdc3c7; border-radius:4px;">
                </div>
                <div style="flex:1;">
                    <label style="font-weight:bold; font-size:0.85rem; color:#7f8c8d;">🚗 Auto's Uitwedstrijd (Max):</label>
                    <input type="number" id="edit-team-autos" style="width:100%; padding:10px; border:1px solid #bdc3c7; border-radius:4px;">
                </div>
            </div>

            <div style="display:flex; flex-direction:column; gap:10px; margin-bottom:20px; background:#f8f9fa; padding:15px; border-radius:6px; border:1px solid #eee;">
                <div style="display:flex; align-items:center; gap:10px;">
                    <input type="checkbox" id="edit-team-vrijwilliger" style="width:18px; height:18px; cursor:pointer;">
                    <label style="font-weight:bold; color:#9b59b6; cursor:pointer;" onclick="document.getElementById('edit-team-vrijwilliger').click()">Is Kader / Vrijwilligers</label>
                </div>
                <div style="display:flex; align-items:center; gap:10px;">
                    <input type="checkbox" id="edit-team-recreant" style="width:18px; height:18px; cursor:pointer;">
                    <label style="font-weight:bold; color:#f39c12; cursor:pointer;" onclick="document.getElementById('edit-team-recreant').click()">Is Recreanten Team (Standaard 'Partijtje' in agenda)</label>
                </div>
            </div>

            <button onclick="window.slaTeamBewerkingOp()" class="primary-btn" style="width:100%; background:#27ae60; font-size:1.1rem; box-shadow:0 4px 6px rgba(0,0,0,0.1);">💾 Wijzigingen Opslaan</button>
        </div>
    </div>

    <!-- Modals en Scripts -->
    <script src="basketbal_data.js"></script>
    <script src="basketbal_auth.js"></script>
    <script src="basketbal_team.js"></script>
    <script type="module" src="firebase_motor.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if(window.renderTeamBeheer) window.renderTeamBeheer();
        });
    </script>
</body>
</html>
