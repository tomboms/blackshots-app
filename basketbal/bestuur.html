<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Shots - Bestuur</title>
    <link rel="stylesheet" href="basketbal.css">
    <style>
        .agenda-punt { background: white; border: 1px solid var(--border-color); border-radius: 6px; padding: 15px; margin-bottom: 15px; border-left: 5px solid #3498db; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .agenda-titel { font-weight: bold; font-size: 1.2rem; color: var(--secondary-color); margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        
        .notitie-veld { width: 100%; min-height: 100px; padding: 10px; border-radius: 4px; font-family: inherit; font-size: 0.95rem; resize: vertical; line-height: 1.5; }
        .prep-veld { background: rgba(230, 126, 34, 0.05); border: 1px solid #f39c12; }
        .live-veld { background: rgba(155, 89, 182, 0.05); border: 1px solid #9b59b6; }
        
        .veld-label { display: block; font-weight: bold; font-size: 0.85rem; margin-bottom: 5px; }
        .label-prep { color: #d35400; }
        .label-live { color: #8e44ad; }

        body.dark-mode .agenda-punt { background: #1e293b; border-color: #334155; }
        body.dark-mode .agenda-titel { border-color: #334155; color: #f8fafc; }
        body.dark-mode .prep-veld { background: rgba(230, 126, 34, 0.1); border-color: #d35400; color: #f8fafc; }
        body.dark-mode .live-veld { background: rgba(155, 89, 182, 0.1); border-color: #8e44ad; color: #f8fafc; }
    </style>
</head>
<body>
    <div id="cloud-status-indicator" style="position: fixed; bottom: 20px; right: 20px; background: #27ae60; color: white; padding: 10px 20px; border-radius: 30px; font-weight: bold; font-size: 0.9rem; z-index: 99999; opacity: 0; pointer-events: none;">☁️ Cloud Actief</div>

    <nav class="top-nav">
        <h1>🏀 Black Shots Clubbeheer</h1>
    </nav>

    <main class="content-sectie active" style="max-width:1100px; margin:20px auto; padding:15px;">
        
        <div id="overzicht-scherm">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 style="margin:0; color:var(--secondary-color);">📁 Bestuursvergaderingen</h2>
                <button onclick="nieuweVergadering()" class="primary-btn" style="background:#27ae60;">+ Nieuwe Vergadering</button>
            </div>
            <div id="vergaderingen-lijst"></div>
        </div>

        <div id="editor-scherm" style="display:none;">
            <button onclick="sluitEditor()" style="background:#7f8c8d; color:white; border:none; padding:8px 15px; border-radius:4px; font-weight:bold; cursor:pointer; margin-bottom:20px;">⬅ Terug naar overzicht</button>
            
            <div class="card" style="border-top-color:#3498db; margin-bottom:20px;">
                <h3 style="margin-top:0; color:var(--secondary-color);">Vergadering Details</h3>
                <div style="display:flex; gap:15px; flex-wrap:wrap;">
                    <div style="flex:1; min-width:200px;">
                        <label style="font-weight:bold; font-size:0.9rem; color:#7f8c8d;">Datum</label>
                        <input type="text" id="v_datum" placeholder="bijv. Maandag 11 Mei" onchange="slaOp()" style="width:100%; padding:10px; border:1px solid #bdc3c7; border-radius:4px;">
                    </div>
                    <div style="flex:1; min-width:150px;">
                        <label style="font-weight:bold; font-size:0.9rem; color:#7f8c8d;">Tijd</label>
                        <input type="text" id="v_tijd" placeholder="bijv. 20:00 uur" onchange="slaOp()" style="width:100%; padding:10px; border:1px solid #bdc3c7; border-radius:4px;">
                    </div>
                    <div style="flex:1; min-width:200px;">
                        <label style="font-weight:bold; font-size:0.9rem; color:#7f8c8d;">Locatie / Adres</label>
                        <input type="text" id="v_adres" placeholder="bijv. Statenlaan 78 / Online" onchange="slaOp()" style="width:100%; padding:10px; border:1px solid #bdc3c7; border-radius:4px;">
                    </div>
                </div>
                <div style="margin-top:15px;">
                    <label style="font-weight:bold; font-size:0.9rem; color:#7f8c8d;">Aanwezigen</label>
                    <input type="text" id="v_aanwezig" placeholder="Martin, Izaac, Jolanda, Tom..." onchange="slaOp()" style="width:100%; padding:10px; border:1px solid #bdc3c7; border-radius:4px;">
                </div>
            </div>

            <div style="display:flex; gap:10px; margin-bottom:30px; flex-wrap:wrap;">
                <button onclick="genereerDocument('agenda')" style="flex:1; min-width:200px; background:#3498db; color:white; border:none; padding:15px; border-radius:6px; font-weight:bold; font-size:1rem; cursor:pointer; box-shadow:0 4px 6px rgba(0,0,0,0.1); transition:0.2s;"><span style="font-size:1.4rem; display:block; margin-bottom:5px;">📄</span> Officiële Agenda <br><span style="font-size:0.8rem; font-weight:normal;">Alleen de agendapunten (PDF)</span></button>
                
                <button onclick="genereerDocument('spiekbrief')" style="flex:1; min-width:200px; background:#e67e22; color:white; border:none; padding:15px; border-radius:6px; font-weight:bold; font-size:1rem; cursor:pointer; box-shadow:0 4px 6px rgba(0,0,0,0.1); transition:0.2s;"><span style="font-size:1.4rem; display:block; margin-bottom:5px;">🤫</span> Jouw Spiekbrief <br><span style="font-size:0.8rem; font-weight:normal;">Met jouw voorbereidingen (PDF)</span></button>
                
                <button onclick="genereerDocument('notulen')" style="flex:1; min-width:200px; background:#9b59b6; color:white; border:none; padding:15px; border-radius:6px; font-weight:bold; font-size:1rem; cursor:pointer; box-shadow:0 4px 6px rgba(0,0,0,0.1); transition:0.2s;"><span style="font-size:1.4rem; display:block; margin-bottom:5px;">✍️</span> Notulen Verslag <br><span style="font-size:0.8rem; font-weight:normal;">Het definitieve verslag (PDF)</span></button>
            </div>

            <h3 style="color:var(--secondary-color); margin:0 0 15px 0;">Agendapunten & Live Notulen</h3>
            <div id="agenda-punten-container"></div>

            <button onclick="voegExtraPuntToe()" style="background:#27ae60; color:white; border:none; padding:12px 20px; border-radius:4px; font-weight:bold; cursor:pointer; margin-top:10px; font-size:1rem;">+ Extra Onderwerp Toevoegen</button>
            
            <div style="border-top:1px solid var(--border-color); margin-top:50px; padding-top:20px;">
                <button onclick="verwijderVergadering()" style="background:#e74c3c; color:white; border:none; padding:10px 20px; border-radius:4px; font-weight:bold; cursor:pointer; float:right;">🗑️ Vergadering Wissen</button>
            </div>
        </div>

    </main>

    <script src="basketbal_auth.js"></script>
    <script src="basketbal_data.js"></script>
    <script type="module" src="firebase_motor.js"></script>
    
    <script>
        let bestuurDB = JSON.parse(localStorage.getItem('blackshots_bestuur')) || [];
        let actieveVergaderingId = null;

        const standaardPunten = [
            "Opening en vaststellen agendapunten",
            "Mededelingen en ledenmutaties",
            "Actielijst",
            "Ingekomen stukken",
            "Financiën",
            "Jaarplanning"
        ];
        const eindPunten = [
            "Rondvraag",
            "Vaststellen volgende vergaderdatum en sluiting"
        ];

        function tekenOverzicht() {
            let container = document.getElementById('vergaderingen-lijst');
            container.innerHTML = '';
            
            if (bestuurDB.length === 0) {
                container.innerHTML = '<p style="color:#7f8c8d; font-style:italic;">Nog geen vergaderingen gepland. Klik op de groene knop!</p>';
                return;
            }

            let gesorteerd = [...bestuurDB].reverse();

            gesorteerd.forEach(v => {
                container.innerHTML += `
                    <div onclick="openVergadering('${v.id}')" class="card" style="cursor:pointer; transition:0.2s; border-left:6px solid #3498db; margin-bottom:10px;" onmouseover="this.style.transform='translateX(5px)'" onmouseout="this.style.transform='translateX(0)'">
                        <strong style="font-size:1.2rem; color:var(--secondary-color);">📅 ${v.datum || 'Nieuwe Vergadering'}</strong>
                        <div style="color:#7f8c8d; font-size:0.9rem; margin-top:5px;">🕒 ${v.tijd || '?'} | 📍 ${v.adres || '?'}</div>
                        <div style="font-size:0.85rem; margin-top:8px; color:#9b59b6; font-weight:bold;">${v.extraPunten.length} Extra onderwerpen toegevoegd</div>
                    </div>
                `;
            });
        }

        window.nieuweVergadering = function() {
            let nw = {
                id: 'verg_' + Date.now(),
                datum: '', tijd: '20:00 uur', adres: '', aanwezig: 'Martin, Izaac, Jolanda, Tom',
                notitiesStandaard: {}, notitiesEind: {}, extraPunten: [],
                verslagStandaard: {}, verslagEind: {}
            };
            bestuurDB.push(nw);
            slaOpEnHerlaad();
            openVergadering(nw.id);
        };

        window.openVergadering = function(id) {
            actieveVergaderingId = id;
            let v = bestuurDB.find(x => x.id === id);
            if (!v) return;

            // Reparatie voor oude vergaderingen zonder de nieuwe 'verslag' vakken
            if (!v.verslagStandaard) v.verslagStandaard = {};
            if (!v.verslagEind) v.verslagEind = {};
            v.extraPunten.forEach(ex => { if(typeof ex.verslag === 'undefined') ex.verslag = ''; });

            document.getElementById('overzicht-scherm').style.display = 'none';
            document.getElementById('editor-scherm').style.display = 'block';

            document.getElementById('v_datum').value = v.datum || '';
            document.getElementById('v_tijd').value = v.tijd || '';
            document.getElementById('v_adres').value = v.adres || '';
            document.getElementById('v_aanwezig').value = v.aanwezig || '';

            tekenAgendaPunten();
        };

        window.sluitEditor = function() {
            actieveVergaderingId = null;
            document.getElementById('editor-scherm').style.display = 'none';
            document.getElementById('overzicht-scherm').style.display = 'block';
            tekenOverzicht();
        };

        function tekenAgendaPunten() {
            let v = bestuurDB.find(x => x.id === actieveVergaderingId);
            let container = document.getElementById('agenda-punten-container');
            container.innerHTML = '';

            let puntNummer = 1;

            // --- FUNCTIE OM DE 2 VAKKEN TE GENEREREN ---
            const genereerVakken = (type, idx, prepTekst, liveTekst) => {
                return `
                <div style="display:flex; gap:15px; flex-wrap:wrap; margin-top:10px;">
                    <div style="flex:1; min-width:250px;">
                        <label class="veld-label label-prep">🤫 Jouw Voorbereiding / Punten</label>
                        <textarea class="notitie-veld prep-veld" placeholder="Wat wil je hier bespreken?" onchange="slaNotitieOp('${type}', ${idx}, this.value)">${prepTekst}</textarea>
                    </div>
                    <div style="flex:1; min-width:250px;">
                        <label class="veld-label label-live">✍️ Live Notulen / Besluiten</label>
                        <textarea class="notitie-veld live-veld" placeholder="Typ hier de live notulen tijdens de vergadering..." onchange="slaVerslagOp('${type}', ${idx}, this.value)">${liveTekst}</textarea>
                    </div>
                </div>`;
            };

            // 1. STANDAARD PUNTEN
            standaardPunten.forEach((titel, idx) => {
                let prep = v.notitiesStandaard[idx] || '';
                let live = v.verslagStandaard[idx] || '';
                
                container.innerHTML += `
                    <div class="agenda-punt" style="border-left-color:#3498db;">
                        <div class="agenda-titel">${puntNummer}. ${titel}</div>
                        ${genereerVakken('std', idx, prep, live)}
                    </div>`;
                puntNummer++;
            });

            // 2. EXTRA PUNTEN
            if (v.extraPunten.length > 0) {
                container.innerHTML += `<div class="agenda-titel" style="margin:30px 0 10px 0; color:#27ae60; font-size:1.3rem; border:none;">${puntNummer}. Extra agenda punt(en) bespreken</div>`;
                v.extraPunten.forEach((extra, idx) => {
                    let prep = extra.notitie || '';
                    let live = extra.verslag || '';

                    container.innerHTML += `
                        <div class="agenda-punt" style="border-left-color:#27ae60; margin-left:15px;">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <input type="text" value="${extra.titel}" placeholder="Titel van dit onderwerp..." onchange="slaExtraTitelOp(${idx}, this.value)" style="flex:1; font-weight:bold; font-size:1.1rem; border:none; border-bottom:2px solid #bdc3c7; background:transparent; margin-bottom:10px; color:inherit; padding-bottom:5px;">
                                <button onclick="verwijderExtraPunt(${idx})" style="background:none; border:none; color:#e74c3c; font-weight:bold; cursor:pointer; font-size:1.2rem; margin-left:10px;">&times;</button>
                            </div>
                            ${genereerVakken('extra', idx, prep, live)}
                        </div>`;
                });
                puntNummer++;
            }

            // 3. EIND PUNTEN
            eindPunten.forEach((titel, idx) => {
                let prep = v.notitiesEind[idx] || '';
                let live = v.verslagEind[idx] || '';
                
                container.innerHTML += `
                    <div class="agenda-punt" style="border-left-color:#e67e22;">
                        <div class="agenda-titel">${puntNummer}. ${titel}</div>
                        ${genereerVakken('eind', idx, prep, live)}
                    </div>`;
                puntNummer++;
            });
        }

        // --- OPSLAAN FUNCTIES ---
        window.slaOp = function() {
            let v = bestuurDB.find(x => x.id === actieveVergaderingId);
            v.datum = document.getElementById('v_datum').value;
            v.tijd = document.getElementById('v_tijd').value;
            v.adres = document.getElementById('v_adres').value;
            v.aanwezig = document.getElementById('v_aanwezig').value;
            slaOpEnHerlaad();
        };

        window.slaNotitieOp = function(type, idx, val) {
            let v = bestuurDB.find(x => x.id === actieveVergaderingId);
            if(type === 'std') v.notitiesStandaard[idx] = val;
            if(type === 'eind') v.notitiesEind[idx] = val;
            if(type === 'extra') v.extraPunten[idx].notitie = val;
            slaOpEnHerlaad();
        };

        window.slaVerslagOp = function(type, idx, val) {
            let v = bestuurDB.find(x => x.id === actieveVergaderingId);
            if(type === 'std') v.verslagStandaard[idx] = val;
            if(type === 'eind') v.verslagEind[idx] = val;
            if(type === 'extra') v.extraPunten[idx].verslag = val;
            slaOpEnHerlaad();
        };

        window.voegExtraPuntToe = function() {
            let v = bestuurDB.find(x => x.id === actieveVergaderingId);
            v.extraPunten.push({ titel: '', notitie: '', verslag: '' });
            slaOpEnHerlaad();
            tekenAgendaPunten();
        };

        window.slaExtraTitelOp = function(idx, val) {
            let v = bestuurDB.find(x => x.id === actieveVergaderingId);
            v.extraPunten[idx].titel = val;
            slaOpEnHerlaad();
        };

        window.verwijderExtraPunt = function(idx) {
            let v = bestuurDB.find(x => x.id === actieveVergaderingId);
            v.extraPunten.splice(idx, 1);
            slaOpEnHerlaad();
            tekenAgendaPunten();
        };

        window.verwijderVergadering = function() {
            if(confirm("Weet je zeker dat je deze hele vergadering wilt wissen?")) {
                bestuurDB = bestuurDB.filter(x => x.id !== actieveVergaderingId);
                slaOpEnHerlaad();
                sluitEditor();
            }
        }

        function slaOpEnHerlaad() {
            localStorage.setItem('blackshots_bestuur', JSON.stringify(bestuurDB));
        }

        // --- DE PDF / WORD EXPORT FUNCTIE (NU MET NOTULEN LOGICA) ---
        window.genereerDocument = function(soort) {
            let v = bestuurDB.find(x => x.id === actieveVergaderingId);
            
            let hoofdtitel = "Bestuursvergadering";
            if (soort === 'notulen') hoofdtitel = "Notulen Bestuursvergadering";
            
            let subtitelDoc = "Agenda";
            if (soort === 'notulen') subtitelDoc = "Besproken Punten & Besluiten";
            if (soort === 'spiekbrief') subtitelDoc = "Agenda & Voorbereiding (Spiekbrief)";

            let htmlDoc = `
            <!DOCTYPE html>
            <html>
            <head>
                <title>${hoofdtitel} Black Shots</title>
                <style>
                    /* De @page margin: 0; verwijdert de browser datum/titel in de PDF! */
                    @page { margin: 0; size: A4 portrait; }
                    body { font-family: 'Arial', sans-serif; color: #000; line-height: 1.5; padding: 2cm; background: white; margin: 0; }
                    
                    .logo-box { text-align: center; margin-bottom: 30px; }
                    .logo-box img { max-width: 180px; }
                    h1 { text-align: left; font-size: 18px; margin-bottom: 20px; font-weight: bold; border-bottom: 2px solid #000; padding-bottom: 5px; }
                    .meta-tabel { width: 100%; border-collapse: collapse; margin-bottom: 30px; font-size: 14px; }
                    .meta-tabel td { padding: 3px 0; vertical-align: top; }
                    .meta-tabel td:first-child { width: 100px; font-weight: bold; }
                    h2 { font-size: 16px; margin-top: 30px; margin-bottom: 10px; font-weight: bold; }
                    .agenda-lijst { list-style-type: decimal; padding-left: 20px; font-size: 14px; font-weight: bold; margin-top: 0; }
                    .agenda-lijst > li { margin-bottom: 15px; }
                    .notitie-blok { font-weight: normal; font-size: 13px; margin-top: 5px; padding-left: 15px; display: block; color: #333; white-space: pre-wrap; }
                    .extra-lijst { list-style-type: disc; font-weight: normal; margin-top: 5px; padding-left: 20px; }
                    .extra-lijst li { margin-bottom: 8px; }
                    
                    @media print {
                        .print-btn { display: none !important; }
                    }
                </style>
            </head>
            <body>
                <button class="print-btn" onclick="window.print()" style="position:fixed; top:20px; right:20px; padding:12px 24px; background:#27ae60; color:white; border:none; border-radius:6px; font-size:16px; font-weight:bold; cursor:pointer; box-shadow:0 4px 10px rgba(0,0,0,0.3);">📥 Opslaan als PDF</button>

                <div class="logo-box">
                    <img src="Logo Zwart.png" alt="Black Shots Logo" onerror="this.style.display='none'">
                </div>
                
                <h1>${hoofdtitel} Black Shots</h1>
                
                <table class="meta-tabel">
                    <tr><td>Datum:</td><td>${v.datum || '...'}</td></tr>
                    <tr><td>Tijd:</td><td>${v.tijd || '...'}</td></tr>
                    <tr><td>Adres:</td><td>${v.adres || '...'}</td></tr>
                    <tr><td>Aanwezig:</td><td>${v.aanwezig || '...'}</td></tr>
                </table>

                <h2>${subtitelDoc}</h2>
                <ol class="agenda-lijst">
            `;

            // 1. Standaard Punten Toevoegen
            standaardPunten.forEach((titel, idx) => {
                htmlDoc += `<li>${titel}`;
                if (soort === 'spiekbrief' && v.notitiesStandaard[idx]) {
                    htmlDoc += `<div class="notitie-blok"><strong>Voorbereiding:</strong><br>${v.notitiesStandaard[idx]}</div>`;
                }
                if (soort === 'notulen' && v.verslagStandaard && v.verslagStandaard[idx]) {
                    htmlDoc += `<div class="notitie-blok"><strong>Besloten / Besproken:</strong><br>${v.verslagStandaard[idx]}</div>`;
                }
                htmlDoc += `</li>`;
            });

            // 2. Extra Punten Toevoegen
            if (v.extraPunten.length > 0) {
                htmlDoc += `<li>Extra agenda punt(en) bespreken`;
                htmlDoc += `<ul class="extra-lijst">`;
                v.extraPunten.forEach(ex => {
                    htmlDoc += `<li><strong>${ex.titel || 'Nieuw punt'}</strong>`;
                    if (soort === 'spiekbrief' && ex.notitie) {
                        htmlDoc += `<div class="notitie-blok" style="padding-left:0;"><strong>Voorbereiding:</strong><br>${ex.notitie}</div>`;
                    }
                    if (soort === 'notulen' && ex.verslag) {
                        htmlDoc += `<div class="notitie-blok" style="padding-left:0;"><strong>Besloten / Besproken:</strong><br>${ex.verslag}</div>`;
                    }
                    htmlDoc += `</li>`;
                });
                htmlDoc += `</ul></li>`;
            } else if (soort === 'agenda') {
                // Toon de titel toch op de lege agenda als er geen extra punten zijn
                htmlDoc += `<li>Extra agenda punt(en) bespreken</li>`;
            }

            // 3. Eind Punten Toevoegen
            eindPunten.forEach((titel, idx) => {
                htmlDoc += `<li>${titel}`;
                if (soort === 'spiekbrief' && v.notitiesEind[idx]) {
                    htmlDoc += `<div class="notitie-blok"><strong>Voorbereiding:</strong><br>${v.notitiesEind[idx]}</div>`;
                }
                if (soort === 'notulen' && v.verslagEind && v.verslagEind[idx]) {
                    htmlDoc += `<div class="notitie-blok"><strong>Besloten / Besproken:</strong><br>${v.verslagEind[idx]}</div>`;
                }
                htmlDoc += `</li>`;
            });

            htmlDoc += `
                </ol>
            </body>
            </html>`;

            let printTab = window.open('', '_blank');
            printTab.document.write(htmlDoc);
            printTab.document.close();
            
            setTimeout(() => {
                printTab.print();
            }, 500);
        };

        setTimeout(tekenOverzicht, 200);
    </script>
</body>
</html>
