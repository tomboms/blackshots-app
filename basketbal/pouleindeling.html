<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Shots - Poule-indelingen</title>
    <link rel="stylesheet" href="basketbal.css?v=6">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .upload-box { border: 2px dashed #3498db; background: rgba(52, 152, 219, 0.05); padding: 25px; text-align: center; border-radius: 8px; cursor: pointer; transition: 0.2s; height: 100%; display: flex; flex-direction: column; justify-content: center; }
        .upload-box:hover { background: rgba(52, 152, 219, 0.1); border-color: #2980b9; transform: translateY(-3px); }
        .file-input { display: none; }
        
        .poule-card { background: white; border: 1px solid var(--border-color); border-radius: 8px; padding: 20px; margin-bottom: 20px; border-top: 5px solid #e67e22; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .team-lijst { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9rem; }
        .team-lijst th { text-align: left; background: #eef2f5; padding: 8px; border-bottom: 2px solid #bdc3c7; }
        .team-lijst td { padding: 8px; border-bottom: 1px solid #eee; }
        .team-lijst tr.is-ons-team { background: rgba(39, 174, 96, 0.1); font-weight: bold; color: #27ae60; }
        
        .schema-lijst { list-style: none; padding: 0; margin: 0; }
        .schema-lijst li { padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .schema-lijst li:nth-child(even) { background: #fafafa; }

        .status-badge { padding: 4px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
        .status-te-plannen { background: #f39c12; color: white; }
        .status-gepland { background: #27ae60; color: white; }
        .status-concept { background: #3498db; color: white; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 99999; }
        .modal-content { background: white; padding: 25px; border-radius: 8px; width: 95%; max-width: 800px; max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }

        body.dark-mode .upload-box { border-color: #475569; background: rgba(71, 85, 105, 0.1); }
        body.dark-mode .poule-card { background: #1e293b; border-color: #334155; }
        body.dark-mode .team-lijst th { background: #0f172a; border-color: #475569; color: #f8fafc; }
        body.dark-mode .team-lijst td { border-color: #334155; color: #cbd5e1; }
        body.dark-mode .team-lijst tr.is-ons-team { background: rgba(39, 174, 96, 0.15); color: #2ecc71; }
        body.dark-mode .schema-lijst li { border-color: #334155; }
        body.dark-mode .schema-lijst li:nth-child(even) { background: #0f172a; }
        body.dark-mode .modal-content { background: #1e293b; color: #f8fafc; border: 1px solid #334155; }
    </style>
</head>
<body>
    <div id="cloud-status-indicator" style="position: fixed; bottom: 20px; right: 20px; background: #27ae60; color: white; padding: 10px 20px; border-radius: 30px; font-weight: bold; font-size: 0.9rem; z-index: 99999; opacity: 0; pointer-events: none;">☁️ Cloud Actief</div>

    <nav class="top-nav">
        <h1>🏀 Black Shots Clubbeheer</h1>
    </nav>

    <main class="content-sectie active" style="max-width:1200px; margin:20px auto; padding:15px;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:10px;">
            <h2 style="margin:0; color:var(--secondary-color);">⛹️ Poule-indelingen & Concepten</h2>
        </div>

        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap:20px; margin-bottom:30px;">
            <div>
                <label class="upload-box" style="border-color:#3498db;">
                    <input type="file" class="file-input" id="upload-indeling" accept=".csv, .xlsx, .xls" onchange="verwerkPouleBestand(event)">
                    <span style="font-size:2.5rem; display:block; margin-bottom:10px;">📊</span>
                    <h3 style="margin:0 0 5px 0; color:#3498db;">1. Concept Indeling</h3>
                    <p style="font-size:0.85rem; color:#7f8c8d; margin:0 0 10px 0;">Upload de lijst van de bond (.csv/.xlsx). Vindt automatisch onze poules en codes.</p>
                    <strong id="label-indeling" style="color:#3498db;">Upload Bestand</strong>
                </label>
            </div>

            <div id="stap-2-box" style="opacity:0.5; pointer-events:none;">
                <label class="upload-box" style="border-color:#e67e22;">
                    <input type="file" class="file-input" id="upload-plantool" accept=".xlsm, .xlsx" onchange="verwerkPlantoolBestand(event)">
                    <span style="font-size:2.5rem; display:block; margin-bottom:10px;">📅</span>
                    <h3 style="margin:0 0 5px 0; color:#e67e22;">2. NBB Plantool</h3>
                    <p style="font-size:0.85rem; color:#7f8c8d; margin:0 0 10px 0;">Koppelt het Concept Speelschema aan onze codes voor datums en speelrondes.</p>
                    <strong id="label-plantool" style="color:#e67e22;">Upload Macro (.xlsm)</strong>
                </label>
            </div>

            <div id="stap-3-box">
                <label class="upload-box" style="border-color:#9b59b6;">
                    <input type="file" class="file-input" id="upload-json" accept=".json" onchange="verwerkNBBJson(event)">
                    <span style="font-size:2.5rem; display:block; margin-bottom:10px;">✅</span>
                    <h3 style="margin:0 0 5px 0; color:#9b59b6;">3. Definitieve Planning</h3>
                    <p style="font-size:0.85rem; color:#7f8c8d; margin:0 0 10px 0;">Upload de JSON export vanuit de NBB zodra de speeldata definitief vaststaan.</p>
                    <strong id="label-json" style="color:#9b59b6;">Upload JSON Export</strong>
                </label>
            </div>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:flex-end; border-bottom:2px solid var(--border-color); padding-bottom:10px; margin-top:40px; margin-bottom:20px;">
            <h3 style="color:var(--secondary-color); margin:0;">Onze Poules & Speelschema's</h3>
            <button onclick="wisAlleData()" style="background:#e74c3c; color:white; border:none; padding:6px 12px; border-radius:4px; font-weight:bold; cursor:pointer; font-size:0.8rem;">🗑️ Wis Geheugen</button>
        </div>

        <div id="poule-resultaten" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(400px, 1fr)); gap:20px;">
            <p style="color:#7f8c8d; font-style:italic;">Upload eerst de Poule Indeling (Stap 1) om te beginnen...</p>
        </div>

    </main>

    <div id="schema-modal" class="modal-overlay">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid var(--border-color); padding-bottom:10px; margin-bottom:20px;">
                <div>
                    <h2 id="modal-titel" style="margin:0; color:var(--secondary-color);">Speelschema</h2>
                    <span id="modal-subtitel" style="font-size:0.9rem; color:#7f8c8d;">Poule details...</span>
                </div>
                <button onclick="sluitSchemaModal()" style="background:#e74c3c; color:white; border:none; padding:8px 15px; border-radius:4px; font-weight:bold; cursor:pointer; font-size:1.1rem;">&times; Sluiten</button>
            </div>
            
            <div id="modal-inhoud"></div>
        </div>
    </div>

    <script src="basketbal_auth.js"></script>
    <script src="basketbal_data.js"></script>
    <script type="module" src="firebase_motor.js"></script>
    <script src="basketbal_pouleindeling.js?v=6"></script>
</body>
</html>
