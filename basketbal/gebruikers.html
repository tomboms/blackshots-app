<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Shots - Trainer Beheer</title>
    <link rel="stylesheet" href="basketbal.css">
</head>
<body>
    <div id="cloud-status-indicator" style="position: fixed; bottom: 20px; right: 20px; background: #27ae60; color: white; padding: 10px 20px; border-radius: 30px; font-weight: bold; font-size: 0.9rem; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 99999; transition: 0.3s; opacity: 0; pointer-events: none;">☁️ Cloud Actief</div>

    <nav class="top-nav">
        <h1>🏀 Black Shots Clubbeheer</h1>
        <a href="../index.html" class="terug-knop">🏠 Terug</a>
    </nav>

    <main class="content-sectie active" style="max-width:900px; margin:20px auto; padding:15px;">
        
        <div class="card" style="border-top-color:#9b59b6;">
            <h3 style="margin-top:0; color:var(--secondary-color);">➕ Nieuwe Medewerker / Trainer Toevoegen</h3>
            <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:15px;">
                <input type="text" id="g_naam" placeholder="Gebruikersnaam (bijv. Lotfi)" style="flex:1; min-width:150px; padding:10px; border:1px solid #ccc; border-radius:4px;">
                <input type="text" id="g_ww" placeholder="Wachtwoord..." style="flex:1; min-width:150px; padding:10px; border:1px solid #ccc; border-radius:4px;">
                <select id="g_rol" style="flex:1; min-width:150px; padding:10px; border:1px solid #ccc; border-radius:4px;">
                    <option value="trainer">🏀 Trainer / Coach</option>
                    <option value="bestuur">💼 Bestuurslid / Secretaris</option>
                    <option value="admin">👑 Hoofdbeheerder (Admin)</option>
                </select>
                <button onclick="window.voegGebruikerToe()" class="primary-btn" style="background:#9b59b6; padding:10px 20px;">Aanmaken</button>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-top:0; color:var(--secondary-color); margin-bottom:20px;">👥 Actieve Accounts & Rechten</h3>
            <div id="gebruikers-lijst-container"></div>
        </div>
    </main>

    <script src="basketbal_auth.js"></script>
    <script src="basketbal_data.js"></script>
    <script type="module" src="firebase_motor.js"></script>
    
    <script src="basketbal_gebruikers.js?v=1"></script>

</body>
</html>
