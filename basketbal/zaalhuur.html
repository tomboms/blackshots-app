<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Shots - Zaalhuur</title>
    <link rel="stylesheet" href="basketbal.css?v=8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div id="cloud-status-indicator" style="position: fixed; bottom: 20px; right: 20px; background: #27ae60; color: white; padding: 10px 20px; border-radius: 30px; font-weight: bold; font-size: 0.9rem; z-index: 99999; opacity: 0; pointer-events: none;">☁️ Cloud Actief</div>

    <nav class="top-nav">
        <h1>🏀 Black Shots Clubbeheer</h1>
    </nav>

    <main class="content-sectie active" style="max-width:1200px; margin:20px auto; padding:15px;">
        
        <div id="notification-banner" style="display:none; background: #e8f8f5; border: 1px solid #2cc5a0; color: #117a65; padding: 15px; border-radius: 8px; margin-bottom: 25px; font-family: Arial, sans-serif; line-height: 1.4;"></div>

        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:10px;">
            <h2 style="margin:0; color:var(--secondary-color);">🏟️ Zaalhuur & Planning Overzicht</h2>
            <div style="display:flex; gap:10px;">
                <button onclick="downloadSjabloon()" style="background:#2ecc71; color:white; border:none; padding:8px 15px; border-radius:4px; font-weight:bold; cursor:pointer; display:flex; align-items:center; gap:5px;">📥 Download Sjabloon</button>
                <button onclick="wisZaalhuur()" style="background:#e74c3c; color:white; border:none; padding:8px 15px; border-radius:4px; font-weight:bold; cursor:pointer;">🗑️ Wis Geheugen</button>
            </div>
        </div>

        <div style="margin-bottom:25px;">
            <label class="upload-box zaalhuur-upload">
                <input type="file" class="file-input" id="upload-zaalhuur" accept=".xlsx, .xls, .csv" onchange="verwerkZaalhuurBestand(event)">
                <span style="font-size:2.5rem; display:block; margin-bottom:10px;">📋</span>
                <h3 style="margin:0 0 5px 0; color:#27ae60;">Upload Gemeente Portal Export</h3>
                <p style="font-size:0.85rem; color:#7f8c8d; margin:0 0 10px 0;">Sleep je Excel hierin of klik om te uploaden. De app scant direct alle regels automatisch.</p>
                <strong id="label-zaalhuur" style="color:#27ae60;">Kies Bestand</strong>
            </label>
        </div>

        <div style="background:#f8f9fa; padding:15px; border-radius:8px; border:1px solid #cbd5e1; display:block; margin-bottom:25px; font-family: Arial, sans-serif;">
            <div style="font-weight:bold; color:#2c3e50; margin-bottom:10px; display:inline-block; margin-right:15px;">🔍 Live Filters:</div>
            <div style="display:inline-block; margin-right:10px; margin-bottom:5px;">
                <select id="filter-zaal" onchange="tekenZaalhuurResultaten()" style="padding:8px; border-radius:4px; border:1px solid #cbd5e1; min-width:160px;">
                    <option value="">-- Alle Zalen --</option>
                </select>
            </div>
            <div style="display:inline-block; margin-right:10px; margin-bottom:5px;">
                <select id="filter-dag" onchange="tekenZaalhuurResultaten()" style="padding:8px; border-radius:4px; border:1px solid #cbd5e1; min-width:140px;">
                    <option value="">-- Alle Dagen --</option>
                    <option value="maandag">Maandag</option>
                    <option value="dinsdag">Dinsdag</option>
                    <option value="woensdag">Woensdag</option>
                    <option value="donderdag">Donderdag</option>
                    <option value="vrijdag">Vrijdag</option>
                    <option value="zaterdag">Zaterdag</option>
                    <option value="zondag">Zondag</option>
                </select>
            </div>
            <div style="display:inline-block; margin-right:10px; margin-bottom:5px;">
                <select id="filter-maand" onchange="tekenZaalhuurResultaten()" style="padding:8px; border-radius:4px; border:1px solid #cbd5e1; min-width:140px;">
                    <option value="">-- Alle Maanden --</option>
                    <option value="jan">Januari</option>
                    <option value="feb">Februari</option>
                    <option value="mrt">Maart</option>
                    <option value="apr">April</option>
                    <option value="mei">Mei</option>
                    <option value="jun">Juni</option>
                    <option value="jul">Juli</option>
                    <option value="aug">Augustus</option>
                    <option value="sep">September</option>
                    <option value="okt">Oktober</option>
                    <option value="nov">November</option>
                    <option value="dec">December</option>
                </select>
            </div>
            <div style="display:inline-block; margin-bottom:5px;">
                <select id="filter-status" onchange="tekenZaalhuurResultaten()" style="padding:8px; border-radius:4px; border:1px solid #cbd5e1; min-width:140px;">
                    <option value="">-- Alle Statussen --</option>
                    <option value="Geboekt">Geboekt</option>
                    <option value="Gefactureerd">Gefactureerd</option>
                    <option value="Geannuleerd">Geannuleerd</option>
                </select>
            </div>
        </div>

        <div style="display:flex; gap:15px; margin-bottom:30px; flex-wrap:wrap;">
            <div class="stat-card" style="border-top: 4px solid #f39c12;">
                <div style="color:#7f8c8d; font-size:0.85rem; font-weight:bold; text-transform:uppercase;">Reserveringen</div>
                <div class="stat-waarde" id="stat-totaal" style="color:#f39c12; font-size:2.2rem;">0</div>
            </div>
            <div class="stat-card" style="border-top: 4px solid #27ae60;">
                <div style="color:#7f8c8d; font-size:0.85rem; font-weight:bold; text-transform:uppercase;">Actieve Uren</div>
                <div class="stat-waarde" id="stat-uren" style="color:#27ae60; font-size:2.2rem;">0.0 u</div>
            </div>
            <div class="stat-card" style="border-top: 4px solid #2ecc71;">
                <div style="color:#7f8c8d; font-size:0.85rem; font-weight:bold; text-transform:uppercase;">Totale Kosten</div>
                <div class="stat-waarde" id="stat-kosten" style="color:#2ecc71; font-size:2.2rem;">€ 0,00</div>
            </div>
            <div class="stat-card" style="border-top: 4px solid #3498db;">
                <div style="color:#7f8c8d; font-size:0.85rem; font-weight:bold; text-transform:uppercase;">Gefactureerd</div>
                <div class="stat-waarde" id="stat-gefactureerd" style="color:#3498db; font-size:2.2rem;">0</div>
            </div>
            <div class="stat-card" style="border-top: 4px solid #e74c3c;">
                <div style="color:#7f8c8d; font-size:0.85rem; font-weight:bold; text-transform:uppercase;">Geannuleerd</div>
                <div class="stat-waarde" id="stat-annuleringen" style="color:#e74c3c; font-size:2.2rem;">0</div>
            </div>
        </div>

        <div id="zaalhuur-resultaten" style="overflow-x:auto;">
            <p style="color:#7f8c8d; font-style:italic;">Upload een zaalhuur bestand om de planning te bekijken...</p>
        </div>

    </main>

    <script src="basketbal_auth.js"></script>
    <script src="basketbal_data.js"></script>
    <script type="module" src="firebase_motor.js"></script>
    <script src="basketbal_zaalhuur.js?v=2"></script>
</body>
</html>
