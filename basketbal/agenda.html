<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Shots - Trainingen</title>
    <link rel="stylesheet" href="basketbal.css">
</head>
<body style="overflow-y: auto;">

    <div id="cloud-status-indicator" style="position: fixed; bottom: 20px; right: 20px; background: #27ae60; color: white; padding: 10px 20px; border-radius: 30px; font-weight: bold; font-size: 0.9rem; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 99999; transition: 0.3s; opacity: 0; pointer-events: none;">
        ☁️ Cloud Actief
    </div>

    <nav class="top-nav">
        <h1>🏀 Black Shots Clubbeheer</h1>
        <div style="display:flex; align-items:center; gap:15px;">
            <button id="dark-mode-toggle" onclick="window.toggleDarkMode()" style="background:transparent; border:none; font-size:1.4rem; cursor:pointer; padding:5px; line-height:1;" title="Schakel Dark Mode">🌙</button>
            <a href="../index.html" class="terug-knop">🏠 Terug naar Portaal</a>
        </div>
    </nav>

    <main class="content-sectie active" style="max-width:1400px;">
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; margin-bottom:15px; border-bottom:2px solid var(--border-color); padding-bottom:10px;">
            <div>
                <h2 style="margin:0; color:var(--secondary-color);">🗓️ Trainingen</h2>
                <span id="week-label" style="font-size:0.9rem; color:var(--text-muted); font-weight:bold;">...</span>
            </div>
            <div style="display:flex; gap:10px;">
                <button onclick="window.wijzigWeek(-1)" class="primary-btn" style="background:var(--secondary-color);">◀ Vorige</button>
                <button onclick="window.gaNaarHuidigeWeek()" class="primary-btn">Huidige Week</button>
                <button onclick="window.wijzigWeek(1)" class="primary-btn" style="background:var(--secondary-color);">Volgende ▶</button>
                <button class="admin-only primary-btn" onclick="window.openBulkModal()" style="background:#e74c3c;">❌ Bulk Annuleren</button>
            </div>
        </div>

        <div id="agenda-grid" class="week-grid"></div>
    </main>

    <div id="dag-detail-modal" class="modal-overlay">
        <div class="modal-content" style="max-width:900px; padding:20px;">
            <button class="modal-close-btn" onclick="window.sluitDagDetail()">&times;</button>
            <h2 id="modal-titel" style="margin-top:0; color:var(--secondary-color); border-bottom:1px solid var(--border-color); padding-bottom:10px;">Team Training</h2>
            
            <div style="display:flex; gap:20px; flex-wrap:wrap;">
                <div style="flex:1; min-width:300px;">
                    <h3 style="color:var(--primary-color);">Tijdlijn</h3>
                    <div id="tijdlijn-container" style="background:var(--card-alt-bg); border:1px solid var(--border-color); border-radius:6px; min-height:250px; padding:10px; display:flex; flex-direction:column; gap:10px;"></div>
                    <button class="primary-btn" onclick="window.opslaanDagDetail()" style="width:100%; margin-top:15px; font-size:1.1rem;">💾 Opslaan & Sluiten</button>
                </div>

                <div style="flex:1; min-width:300px; border-left:2px solid var(--border-color); padding-left:20px;">
                    <h3 style="color:#e67e22;">Voeg Oefening Toe</h3>
                    <select id="filter-categorie" onchange="window.tekenOefeningenKiezer()" style="width:100%; padding:8px; margin-bottom:10px; border-radius:4px; border:1px solid var(--input-border);">
                        <option value="all">-- Alle Categorieën --</option>
                    </select>
                    <input type="text" id="zoek-oefening" onkeyup="window.tekenOefeningenKiezer()" placeholder="Zoek op naam..." style="width:100%; padding:8px; margin-bottom:15px; border-radius:4px; border:1px solid var(--input-border);">
                    <div id="oefeningen-kiezer" style="max-height:300px; overflow-y:auto; padding-right:5px;"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="bulk-modal" class="modal-overlay">
        <div class="modal-content" style="max-width:400px; text-align:center;">
            <button class="modal-close-btn" onclick="document.getElementById('bulk-modal').style.display='none'">&times;</button>
            <h2 style="color:#e74c3c; margin-top:0;">🛑 Annuleer Periode</h2>
            <p style="font-size:0.9rem; color:var(--text-muted);">Verwijder alle trainingen in deze periode.</p>
            <label style="text-align:left; font-weight:bold; display:block; margin-top:10px;">Reden:</label>
            <input type="text" id="bulk-reden" placeholder="Zomervakantie, Feestdag..." style="width:100%; padding:10px;">
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <div style="flex:1;">
                    <label style="font-weight:bold; font-size:0.85rem;">Vanaf (datum):</label>
                    <input type="date" id="bulk-start" style="width:100%; padding:8px;">
                </div>
                <div style="flex:1;">
                    <label style="font-weight:bold; font-size:0.85rem;">Tot en met:</label>
                    <input type="date" id="bulk-eind" style="width:100%; padding:8px;">
                </div>
            </div>
            <button onclick="window.voerBulkAnnuleringUit()" class="primary-btn" style="width:100%; background:#e74c3c;">❌ Annuleer deze hele periode</button>
        </div>
    </div>

    <script src="basketbal_data.js"></script>
    <script src="basketbal_agenda.js"></script>
    <script src="basketbal_auth.js"></script>
    <script type="module" src="firebase_motor.js"></script>
</body>
</html>
