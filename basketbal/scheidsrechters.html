<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Shots - Scheidsrechters</title>
    <link rel="stylesheet" href="basketbal.css">
    <style>
        .matrix-table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .matrix-table th, .matrix-table td { border: 1px solid #e2e8f0; padding: 10px; text-align: center; }
        .matrix-table th { background: #34495e; color: white; font-weight: bold; position: sticky; top: 0; z-index: 10; }
        .matrix-table td:first-child { text-align: left; font-weight: bold; color: var(--secondary-color); background: #f8f9fa; position: sticky; left: 0; z-index: 5; }
        
        /* De status knoppen in de tabel */
        .status-btn { width: 100%; padding: 8px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 0.85rem; box-shadow: inset 0 -2px 0 rgba(0,0,0,0.1); }
        .status-nnb { background: #ecf0f1; color: #7f8c8d; }
        .status-nnb:hover { background: #bdc3c7; }
        .status-aan { background: #2ecc71; color: white; }
        .status-aan:hover { background: #27ae60; }
        .status-af { background: #e74c3c; color: white; }
        .status-af:hover { background: #c0392b; }

        .del-btn { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 0.9rem; margin-left: 5px; opacity: 0.5; }
        .del-btn:hover { opacity: 1; }
    </style>
</head>
<body style="overflow-y: auto;">

    <div id="cloud-status-indicator" style="position: fixed; bottom: 20px; right: 20px; background: #27ae60; color: white; padding: 10px 20px; border-radius: 30px; font-weight: bold; font-size: 0.9rem; z-index: 99999; opacity: 0; pointer-events: none;">☁️ Cloud Actief</div>

    <nav class="top-nav">
        <h1>🏀 Black Shots Clubbeheer</h1>
        <a href="dashboard.html" class="terug-knop">🏠 Dashboard</a>
    </nav>

    <main class="content-sectie active" style="max-width: 1400px; margin: 20px auto; padding: 0 15px;">
        
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; flex-wrap:wrap; gap:10px;">
            <div>
                <h2 style="margin:0; color:var(--secondary-color);">👨‍⚖️ Beschikbaarheid Scheidsrechters</h2>
                <p style="color: #7f8c8d; margin-top:5px; font-size:0.9rem;">Klik op een vakje om te wisselen tussen N.N.B., Aanwezig en Afwezig.</p>
            </div>
            <div style="display:flex; gap:10px;">
                <button onclick="window.haalDagenUitNBB()" style="background:#8e44ad; color:white; border:none; padding:8px 15px; border-radius:4px; font-weight:bold; cursor:pointer;" title="Zoekt automatisch naar thuisspeeldagen in je agenda">⚡ Haal Thuisdagen uit NBB</button>
            </div>
        </div>

        <div style="display:flex; gap:20px; margin-bottom:20px; flex-wrap:wrap;">
            <!-- Toevoegen Formuliertjes -->
            <div style="background:white; padding:15px; border-radius:8px; border:1px solid #cbd5e1; flex:1; min-width:300px; display:flex; gap:10px; align-items:flex-end;">
                <div style="flex:1;">
                    <label style="font-weight:bold; font-size:0.85rem; color:#7f8c8d;">Nieuwe Scheidsrechter Naam:</label>
                    <input type="text" id="nw-sr-naam" placeholder="Bijv. Mark de Vries" style="width:100%; padding:8px; border:1px solid #bdc3c7; border-radius:4px;">
                </div>
                <button onclick="window.voegScheidsToe()" style="background:#3498db; color:white; border:none; padding:9px 15px; border-radius:4px; font-weight:bold; cursor:pointer;">+ Toevoegen</button>
            </div>

            <div style="background:white; padding:15px; border-radius:8px; border:1px solid #cbd5e1; flex:1; min-width:300px; display:flex; gap:10px; align-items:flex-end;">
                <div style="flex:1;">
                    <label style="font-weight:bold; font-size:0.85rem; color:#7f8c8d;">Nieuwe Handmatige Speeldag:</label>
                    <input type="date" id="nw-dag-datum" style="width:100%; padding:8px; border:1px solid #bdc3c7; border-radius:4px;">
                </div>
                <button onclick="window.voegSpeeldagToe()" style="background:#e67e22; color:white; border:none; padding:9px 15px; border-radius:4px; font-weight:bold; cursor:pointer;">+ Dag Toevoegen</button>
            </div>
        </div>

        <div style="overflow-x:auto; padding-bottom:20px;">
            <table class="matrix-table" id="beschikbaarheid-tabel">
                <!-- Wordt door JS opgebouwd -->
            </table>
        </div>

    </main>

    <script src="basketbal_auth.js"></script>
    <script src="basketbal_scheidsrechters.js"></script>
    <script type="module" src="firebase_motor.js"></script>
    <script>document.addEventListener('DOMContentLoaded', () => { setTimeout(() => { window.initScheidsMatrix(); }, 200); });</script>
</body>
</html>
