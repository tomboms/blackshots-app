<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Shots - Wedstrijd Planner</title>
    <link rel="stylesheet" href="basketbal.css">
    <style>
        .planner-controls { background: white; padding: 15px; border-radius: 8px; border-top: 4px solid #8e44ad; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; gap: 15px; flex-wrap: wrap; align-items: center; margin-bottom: 20px; }
        .planner-bord { display: flex; background: #f8f9fa; border: 1px solid #cbd5e1; border-radius: 8px; overflow: hidden; position: relative; min-height: 800px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.02); }
        .tijd-as { width: 60px; background: #e2e8f0; border-right: 1px solid #cbd5e1; display: flex; flex-direction: column; }
        .tijd-slot { height: 60px; /* 60px = 60 minuten in dit voorbeeld, 30 min = 30px */ border-bottom: 1px solid #cbd5e1; display: flex; align-items: flex-start; justify-content: center; padding-top: 5px; font-size: 0.75rem; color: #7f8c8d; font-weight: bold; box-sizing: border-box; }
        .veld-kolom { flex: 1; border-right: 1px dashed #cbd5e1; position: relative; min-width: 250px; }
        .veld-kolom:last-child { border-right: none; }
        .veld-header { background: #34495e; color: white; text-align: center; padding: 10px; font-weight: bold; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid #2c3e50; }
        .grid-lijnen { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; }
        .grid-lijn-30m { border-bottom: 1px dashed #e2e8f0; height: 30px; box-sizing: border-box; }
        .grid-lijn-60m { border-bottom: 1px solid #cbd5e1; height: 30px; box-sizing: border-box; }
        
        .wedstrijd-blok { position: absolute; left: 5px; right: 5px; background: #fff3e0; border: 2px solid #e67e22; border-radius: 6px; padding: 5px; font-size: 0.8rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); cursor: grab; display: flex; flex-direction: column; overflow: hidden; z-index: 5; transition: transform 0.1s; }
        .wedstrijd-blok:active { cursor: grabbing; transform: scale(1.02); z-index: 50; box-shadow: 0 8px 15px rgba(0,0,0,0.2); }
        .wb-titel { font-weight: bold; color: #d35400; margin-bottom: 3px; font-size: 0.9rem; }
        .wb-meta { color: #7f8c8d; font-size: 0.75rem; }
        .wb-taken { margin-top: auto; border-top: 1px dashed #f39c12; padding-top: 5px; display: flex; flex-direction: column; gap: 2px; }
        .taak-regel { background: rgba(255,255,255,0.8); border: 1px solid #f39c12; border-radius: 4px; padding: 2px 4px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body style="overflow-y: auto;">

    <div id="cloud-status-indicator" style="position: fixed; bottom: 20px; right: 20px; background: #27ae60; color: white; padding: 10px 20px; border-radius: 30px; font-weight: bold; font-size: 0.9rem; z-index: 99999; opacity: 0; pointer-events: none;">☁️ Cloud Actief</div>

    <nav class="top-nav">
        <h1>🏀 Black Shots Clubbeheer</h1>
        <a href="dashboard.html" class="terug-knop">🏠 Dashboard</a>
    </nav>

    <main class="content-sectie active" style="max-width: 1400px; margin: 20px auto; padding: 0 15px;">
        
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; flex-wrap:wrap; gap:10px;">
            <h2 style="margin:0; color:var(--secondary-color);">🧩 Thuiswedstrijd Planner</h2>
            <button style="background:#27ae60; color:white; border:none; padding:8px 15px; border-radius:4px; font-weight:bold; cursor:pointer;">💾 Concept Opslaan</button>
        </div>

        <div class="planner-controls">
            <div>
                <label style="font-weight:bold; font-size:0.85rem; color:#7f8c8d; display:block;">Speeldatum:</label>
                <input type="date" id="plan-datum" onchange="window.laadPlanbord()" style="padding:8px; border:1px solid #bdc3c7; border-radius:4px; font-weight:bold;">
            </div>
            <div>
                <label style="font-weight:bold; font-size:0.85rem; color:#7f8c8d; display:block;">Zaal / Locatie:</label>
                <select id="plan-locatie" onchange="window.laadPlanbord()" style="padding:8px; border:1px solid #bdc3c7; border-radius:4px; font-weight:bold;">
                    <option value="veka">De Veka (2 Velden)</option>
                    <option value="veste">De Veste (1 Veld)</option>
                </select>
            </div>
            <div style="margin-left:auto; display:flex; gap:10px;">
                <div style="background:#eef2f5; padding:8px 12px; border-radius:4px; font-size:0.85rem; font-weight:bold; color:#34495e; border:1px solid #cbd5e1;">
                    ⏱️ Wedstrijdduur in dit concept: <span style="color:#d35400;">1.5 Uur (90m)</span>
                </div>
            </div>
        </div>

        <div class="planner-bord" id="planner-bord-container">
            <!-- Dit wordt via Javascript getekend -->
        </div>

    </main>

    <script src="basketbal_auth.js"></script>
    <script src="basketbal_planner.js"></script>
    <script type="module" src="firebase_motor.js"></script>
    <script>document.addEventListener('DOMContentLoaded', () => { setTimeout(() => { window.initPlanner(); }, 200); });</script>
</body>
</html>
