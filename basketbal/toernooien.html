<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Shots - Toernooien</title>
    <link rel="stylesheet" href="basketbal.css">
    <style>
        /* Speciale stijlen voor de Presentatiemodus */
        body.show-mode .top-nav, 
        body.show-mode .tab-menu, 
        body.show-mode .hide-in-show-mode {
            display: none !important;
        }
        body.show-mode .content-sectie {
            padding: 10px;
        }
        body.show-mode {
            font-size: 1.2rem;
            background: #fdfdfd;
        }
    </style>
</head>
<body style="overflow-y: auto;">

    <div id="cloud-status-indicator" style="position: fixed; bottom: 20px; right: 20px; background: #27ae60; color: white; padding: 10px 20px; border-radius: 30px; font-weight: bold; font-size: 0.9rem; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 99999; transition: 0.3s;">☁️ Cloud Actief</div>

    <nav class="top-nav">
        <h1>🏀 Black Shots Clubbeheer</h1>
        <a href="../index.html" class="terug-knop">🏠 Terug naar Portaal</a>
    </nav>

    <div class="tab-menu">
        <button class="tab-btn" onclick="window.location.href='dashboard.html'">📊 Dashboard</button>
        <button class="tab-btn" onclick="window.location.href='agenda.html'">📅 Weekagenda</button>       
        <button class="tab-btn" onclick="window.location.href='team.html'">👥 Teams</button>
        <button class="tab-btn" onclick="window.location.href='spelers.html'">👤 Spelers</button>
        
        <button class="tab-btn" onclick="window.location.href='oefeningen.html'">📋 Oefeningen</button>
        <button class="tab-btn active" onclick="window.location.href='toernooien.html'">🏆 Interne Toernooien</button>
        <button class="tab-btn" onclick="window.location.href='instellingen.html'">⚙️ Instellingen</button>
    </div>

    <main class="content-sectie active">
        
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; margin-bottom:15px; border-bottom:2px solid var(--border-color); padding-bottom:10px;">
            <div style="display:flex; align-items:center; gap:15px; flex-wrap:wrap;">
                <h2 style="margin:0;">🏆 Toernooien</h2>
                <select id="toernooi-select" onchange="window.wisselToernooi()" style="padding:10px; border-radius:6px; border:2px solid var(--primary-color); font-weight:bold; font-size:1rem; min-width:200px;"></select>
                <button class="hide-in-show-mode" onclick="window.maakNieuweCompetitie()" style="background:#27ae60; color:white; border:none; padding:10px 15px; border-radius:4px; font-weight:bold; cursor:pointer;">+ Nieuwe Competitie</button>
            </div>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button onclick="window.toggleShowMode()" style="background:#8e44ad; color:white; border:none; padding:10px 20px; border-radius:6px; font-weight:bold; cursor:pointer; box-shadow:0 4px 6px rgba(0,0,0,0.1);">📺 Show Modus</button>
                <button class="hide-in-show-mode" onclick="window.verwijderCompetitie()" style="background:#e74c3c; color:white; border:none; padding:10px 15px; border-radius:6px; font-weight:bold; cursor:pointer;">Prullenbak</button>
            </div>
        </div>

        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap:20px;">
            
            <div style="background:white; padding:15px; border-radius:8px; border-top:4px solid #f1c40f; box-shadow:0 2px 5px rgba(0,0,0,0.05);">
                <h3 style="margin-top:0; color:var(--secondary-color);">📊 Actuele Stand</h3>
                <div id="toernooi-stand" style="overflow-x:auto;"></div>
            </div>

            <div style="background:white; padding:15px; border-radius:8px; border-top:4px solid #3498db; box-shadow:0 2px 5px rgba(0,0,0,0.05);">
                <h3 style="margin-top:0; color:var(--secondary-color);">📅 Wedstrijdschema</h3>
                
                <div class="hide-in-show-mode" style="background:#eef2f5; padding:10px; border-radius:6px; margin-bottom:15px; display:flex; gap:10px; flex-wrap:wrap;">
                    <input type="date" id="nw_datum" style="padding:8px; flex:1;">
                    <input type="time" id="nw_tijd" style="padding:8px; flex:1;">
                    <input type="text" id="nw_veld" placeholder="Veld..." style="padding:8px; flex:1;">
                    <select id="nw_thuis" style="padding:8px; flex:1.5;"></select>
                    <span style="display:flex; align-items:center; font-weight:bold;">VS</span>
                    <select id="nw_uit" style="padding:8px; flex:1.5;"></select>
                    <button onclick="window.toernooiWedstrijdToevoegen()" style="background:#3498db; color:white; border:none; padding:8px 15px; border-radius:4px; font-weight:bold; cursor:pointer;">Plan in</button>
                </div>

                <div id="toernooi-schema"></div>
            </div>

            <div class="hide-in-show-mode" style="background:white; padding:15px; border-radius:8px; border-top:4px solid #2ecc71; box-shadow:0 2px 5px rgba(0,0,0,0.05);">
                <h3 style="margin-top:0; color:var(--secondary-color);">👥 Toernooiteams</h3>
                
                <div style="display:flex; gap:10px; margin-bottom:15px;">
                    <input type="text" id="nt_naam" placeholder="Teamnaam (bijv. De Bulls)" style="padding:10px; flex:2; border:1px solid #ddd; border-radius:4px;">
                    <input type="color" id="nt_kleur" value="#3498db" style="padding:0; height:38px; width:40px; border:none; border-radius:4px; cursor:pointer;">
                    <button onclick="window.toernooiTeamToevoegen()" style="background:#2ecc71; color:white; border:none; padding:10px; border-radius:4px; font-weight:bold; cursor:pointer;">Toevoegen</button>
                </div>

                <div id="toernooi-teams" style="display:flex; flex-direction:column; gap:10px;"></div>
            </div>

        </div>
    </main>

    <div id="live-score-container"></div>

    <script src="basketbal_data.js"></script>
    <script src="basketbal_toernooi.js"></script>
    <script type="module" src="firebase_motor.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => { 
            if(window.vulToernooiSelect) window.vulToernooiSelect(); 
        });
    </script>
</body>
</html>
