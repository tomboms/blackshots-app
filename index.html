<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Shots - Login</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #2c3e50; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; color: #333; padding: 40px; border-radius: 12px; box-shadow: 0 15px 40px rgba(0,0,0,0.5); text-align: center; max-width: 350px; width: 90%; border-top: 6px solid #e67e22; }
        .login-box h1 { color: #2c3e50; margin-top: 0; font-size: 1.8rem; }
        .login-box h1 span { color: #e67e22; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #bdc3c7; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; background: #3498db; color: white; border: none; padding: 15px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1.1rem; margin-top: 10px; }
        button:hover { background: #2980b9; }
        .error { color: #e74c3c; margin-bottom: 10px; display: none; font-weight: bold; background: #fdedec; padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Black<span>Shots</span></h1>
        <p style="color: #7f8c8d; margin-bottom: 20px;">Vul je gebruikersnaam en wachtwoord in.</p>
        
        <div id="error-msg" class="error">⚠️ Naam of wachtwoord onjuist.</div>
        
        <input type="text" id="gebruikersnaam" placeholder="Gebruikersnaam (bijv. Thijmen)...">
        <input type="password" id="wachtwoord" placeholder="Wachtwoord..." onkeypress="if(event.key === 'Enter') checkLogin()">
        <button onclick="checkLogin()">Inloggen</button>
    </div>

    <script>
        function checkLogin() {
            const naamInput = document.getElementById('gebruikersnaam').value.trim().toLowerCase();
            const wwInput = document.getElementById('wachtwoord').value;
            const error = document.getElementById('error-msg');
            
            // Haal de live gebruikerslijst op uit het geheugen
            let gebruikers = JSON.parse(localStorage.getItem('blackshots_gebruikers')) || [];
            
            // Zoek of de combinatie klopt
            let match = gebruikers.find(g => g.id.toLowerCase() === naamInput && g.wachtwoord === wwInput);
            
            if (match) {
                // Sla de ingelogde persoon en zijn rechten tijdelijk op
                localStorage.setItem('bs_actieve_gebruiker', JSON.stringify(match));
                localStorage.setItem('bs_rol', match.rol);
                
                // Bepaal de startpagina op basis van rechten
                if (match.paginas.includes('all') || match.paginas.includes('dashboard')) {
                    window.location.href = 'basketbal/dashboard.html';
                } else {
                    window.location.href = 'basketbal/' + match.paginas[0] + '.html';
                }
            } else {
                error.style.display = 'block';
            }
        }

        window.onload = function() {
            if(localStorage.getItem('bs_actieve_gebruiker')) {
                let match = JSON.parse(localStorage.getItem('bs_actieve_gebruiker'));
                if (match.paginas.includes('all') || match.paginas.includes('dashboard')) {
                    window.location.href = 'basketbal/dashboard.html';
                } else {
                    window.location.href = 'basketbal/' + match.paginas[0] + '.html';
                }
            }
        }
    </script>
</body>
</html>
